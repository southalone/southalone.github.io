  <p>
    I am an undergraduate student at Shanghai Jiao Tong University, majoring in Intelligent Perception.
    My research interests lie in <strong>reinforcement learning</strong> and <strong>large language models</strong>.
  </p>
  <p>
  I am a highly motivated researcher with experience in autonomous driving, DDQN-based reinforcement learning,
  few-shot learning, and LLM code agents. I have contributed to drone-assisted multi-sensory autonomous driving systems,
  repository-level LLM benchmarks, and agent-driven evaluation pipelines through research projects and industry internships.
  </p>

