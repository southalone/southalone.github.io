short_bio: >-
  <p>
    I am an undergraduate student at Shanghai Jiao Tong University, majoring in Intelligent Perception.
    My research interests lie in <strong>agent evaluation</strong>.
  </p>
  <p>
    My work focuses on building benchmarks and evaluation frameworks for LLM-based code agents.
    I have contributed to repository-level benchmarks such as CoreCodeBench and PRDBench, including
    automated benchmark construction pipelines, fine-grained task design, and agent-driven evaluation methods.
  </p>

